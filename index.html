<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grimespot — Streetwear Pesado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0F0F0F;
    --neon: #39FF14;
    --white: #F5F5F5;
    --cement: #1a1a1a;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* GRAIN OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
    z-index: 999;
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 40px 20px;
    text-align: center;
  }

  /* Neon scan line */
  .hero::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: var(--neon);
    opacity: 0.15;
    animation: scanline 4s linear infinite;
    pointer-events: none;
  }
  @keyframes scanline {
    0%   { top: 0%; }
    100% { top: 100%; }
  }

  .logo-wrap {
    width: min(340px, 80vw);
    margin-bottom: 28px;
    animation: fadeUp 1s ease both;
    filter: drop-shadow(0 0 32px rgba(57,255,20,0.35));
  }
  .logo-wrap img { width: 100%; display: block; }

  .coming {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(13px, 3.5vw, 17px);
    letter-spacing: 0.38em;
    color: var(--neon);
    text-shadow: 0 0 18px rgba(57,255,20,0.7);
    margin-bottom: 10px;
    animation: fadeUp 1s 0.2s ease both;
  }

  .tagline {
    font-size: clamp(11px, 2.5vw, 13px);
    letter-spacing: 0.18em;
    color: rgba(245,245,245,0.45);
    margin-bottom: 48px;
    animation: fadeUp 1s 0.35s ease both;
  }

  /* COUNTDOWN */
  .countdown-wrap {
    animation: fadeUp 1s 0.5s ease both;
    margin-bottom: 52px;
  }
  .countdown-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: rgba(57,255,20,0.6);
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .countdown {
    display: flex;
    gap: 12px;
    justify-content: center;
    align-items: flex-start;
  }
  .cd-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .cd-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 14vw, 80px);
    line-height: 1;
    color: var(--white);
    border: 1px solid rgba(57,255,20,0.2);
    padding: 8px 16px;
    min-width: 80px;
    text-align: center;
    position: relative;
    background: rgba(57,255,20,0.03);
    transition: color 0.1s, text-shadow 0.1s;
  }
  .cd-num.tick {
    color: var(--neon);
    text-shadow: 0 0 20px rgba(57,255,20,0.8);
  }
  .cd-unit {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: rgba(245,245,245,0.35);
    text-transform: uppercase;
  }
  .cd-sep {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 12vw, 72px);
    color: rgba(57,255,20,0.3);
    line-height: 1;
    margin-top: 8px;
  }

  /* DROP DATE */
  .drop-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(11px, 3vw, 14px);
    letter-spacing: 0.5em;
    color: rgba(245,245,245,0.25);
    margin-bottom: 52px;
    animation: fadeUp 1s 0.65s ease both;
  }
  .drop-date span { color: var(--neon); }

  /* BUTTONS */
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: min(320px, 90vw);
    animation: fadeUp 1s 0.8s ease both;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 16px 24px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.06);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
  }
  .btn:hover::before { transform: translateX(0); }

  .btn-primary {
    background: var(--neon);
    color: #000;
    box-shadow: 0 0 24px rgba(57,255,20,0.4);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 40px rgba(57,255,20,0.65);
  }
  .btn-secondary {
    background: transparent;
    color: var(--white);
    border: 1px solid rgba(245,245,245,0.2);
  }
  .btn-secondary:hover {
    border-color: var(--neon);
    color: var(--neon);
    transform: translateY(-2px);
  }

  /* DIVIDER */
  .divider {
    width: min(320px, 90vw);
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(57,255,20,0.3), transparent);
    margin: 60px auto 0;
    animation: fadeUp 1s 1s ease both;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 32px 20px 40px;
    animation: fadeUp 1s 1.1s ease both;
  }
  .footer-location {
    font-size: 10px;
    letter-spacing: 0.28em;
    color: rgba(245,245,245,0.25);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .footer-handle {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.35em;
    color: rgba(57,255,20,0.45);
  }

  /* NEON corner accents */
  .corner {
    position: fixed;
    width: 32px; height: 32px;
    pointer-events: none;
    z-index: 10;
    opacity: 0.4;
  }
  .corner-tl { top: 20px; left: 20px; border-top: 1px solid var(--neon); border-left: 1px solid var(--neon); }
  .corner-tr { top: 20px; right: 20px; border-top: 1px solid var(--neon); border-right: 1px solid var(--neon); }
  .corner-bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--neon); border-left: 1px solid var(--neon); }
  .corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--neon); border-right: 1px solid var(--neon); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<script>
  const target = new Date('2026-05-10T00:00:00');

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const now  = new Date();
    const diff = target - now;
    if (diff <= 0) {
      ['cd-d','cd-h','cd-m','cd-s'].forEach(id => document.getElementById(id).textContent = '00');
      return;
    }
    const days  = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins  = Math.floor((diff % 3600000)  / 60000);
    const secs  = Math.floor((diff % 60000)    / 1000);

    const ids = ['cd-d','cd-h','cd-m','cd-s'];
    const vals = [days, hours, mins, secs];
    ids.forEach((id, i) => {
      const el = document.getElementById(id);
      const v  = pad(vals[i]);
      if (el.textContent !== v) {
        el.textContent = v;
        el.classList.add('tick');
        setTimeout(() => el.classList.remove('tick'), 150);
      }
    });
  }

  tick();
  setInterval(tick, 1000);
</script>
